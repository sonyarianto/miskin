name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: miskin-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin_name: miskin-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin_name: miskin-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: miskin-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: miskin-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compiler (linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy raw binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/miskin ${{ matrix.bin_name }}

      - name: Copy raw binary (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/miskin.exe ${{ matrix.bin_name }}

      - name: Package archive (unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf miskin-${{ matrix.target }}.tar.gz miskin
          sha256sum miskin-${{ matrix.target }}.tar.gz > miskin-${{ matrix.target }}.tar.gz.sha256

      - name: Package archive (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a miskin-${{ matrix.target }}.zip miskin.exe
          sha256sum miskin-${{ matrix.target }}.zip > miskin-${{ matrix.target }}.zip.sha256

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.bin_name }}
            target/${{ matrix.target }}/release/miskin-*.tar.gz
            target/${{ matrix.target }}/release/miskin-*.tar.gz.sha256
            target/${{ matrix.target }}/release/miskin-*.zip
            target/${{ matrix.target }}/release/miskin-*.zip.sha256
