name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf miskin-${{ matrix.target }}.tar.gz miskin
          sha256sum miskin-${{ matrix.target }}.tar.gz > miskin-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a miskin-${{ matrix.target }}.zip miskin.exe
          sha256sum miskin-${{ matrix.target }}.zip > miskin-${{ matrix.target }}.zip.sha256
        shell: bash

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/miskin-*.tar.gz
            target/${{ matrix.target }}/release/miskin-*.tar.gz.sha256
            target/${{ matrix.target }}/release/miskin-*.zip
            target/${{ matrix.target }}/release/miskin-*.zip.sha256
